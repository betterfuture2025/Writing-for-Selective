const fromB64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),{name:'PBKDF2'},false,['deriveKey']);
  const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:fromB64(SALT),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:fromB64(IV)},k,fromB64(CIPHER));
  return new TextDecoder().decode(dec);
}
async function tryUnlock(){
  const pw=document.getElementById('pw').value;
  const errEl=document.getElementById('err');
  errEl.textContent='';
  try{
    const html=await unlock(pw);
    document.open();document.write(html);document.close();
  }catch(e){errEl.textContent='Wrong password. Please try again.';}
}
document.getElementById('go').addEventListener('click',tryUnlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
</script>
